name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: npm ci

      - name: Prepare WXT types
        run: npx wxt prepare

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Create dist.zip
        run: |
          cd dist || exit 0
          zip -r ../dist.zip . || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-zip
          path: dist.zip
