name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: npm ci

      - name: Prepare WXT types
        run: npx wxt prepare

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Create ZIP
        run: cd .output/chrome-mv3 && zip -r ../../ayamir-${{ github.ref_name }}-chrome.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ayamir-${{ github.ref_name }}-chrome.zip
          generate_release_notes: true
