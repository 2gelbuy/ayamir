<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle pattern overlay -->
    <pattern id="dots" x="40" y="40" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.5" fill="white" opacity="0.05"/>
      <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGradient)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Shield + Clock Icon -->
  <g transform="translate(640, 220)">
    <!-- Shield -->
    <path d="M -40 -50 L 0 -60 L 40 -50 L 40 -20 Q 40 10 0 40 Q -40 10 -40 -20 Z"
          fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>

    <!-- Clock circle -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="white" stroke-width="2.5"/>

    <!-- Clock center dot -->
    <circle cx="0" cy="0" r="3" fill="white"/>

    <!-- Hour hand -->
    <line x1="0" y1="0" x2="0" y2="-12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Minute hand -->
    <line x1="0" y1="0" x2="15" y2="0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Main Title -->
  <text x="640" y="400" font-family="Arial, sans-serif" font-size="72" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="2">
    AyaMir
  </text>

  <!-- Tagline -->
  <text x="640" y="460" font-family="Arial, sans-serif" font-size="32" font-weight="300"
        fill="white" opacity="0.85" text-anchor="middle" letter-spacing="0.5">
    Protect your time, build your legacy.
  </text>

  <!-- Badges/Keywords -->
  <text x="640" y="550" font-family="Arial, sans-serif" font-size="18" font-weight="400"
        fill="white" opacity="0.6" text-anchor="middle" letter-spacing="0.3">
    Pomodoro • Site Blocker • Tasks • 100% Local
  </text>

  <!-- Decorative accents -->
  <line x1="300" y1="570" x2="980" y2="570" stroke="white" stroke-width="1" opacity="0.2"/>
</svg>