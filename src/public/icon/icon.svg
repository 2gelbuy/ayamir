<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D9488"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="64" y1="28" x2="64" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.25"/>
      <stop offset="1" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="clockGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Subtle inner shadow -->
  <rect width="128" height="128" rx="28" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Shield -->
  <path d="M64 26L38 37V59C38 76.5 49.5 92.5 64 98C78.5 92.5 90 76.5 90 59V37L64 26Z" fill="url(#shieldFill)" stroke="white" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Clock face -->
  <circle cx="64" cy="60" r="18" fill="rgba(13,148,136,0.3)" stroke="white" stroke-width="2.5" filter="url(#clockGlow)"/>
  <!-- Clock tick marks -->
  <line x1="64" y1="44" x2="64" y2="47" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="64" y1="73" x2="64" y2="76" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="60" x2="51" y2="60" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="77" y1="60" x2="80" y2="60" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Hour hand -->
  <line x1="64" y1="60" x2="64" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="64" y1="60" x2="73" y2="54" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="60" r="2.5" fill="white"/>
  <!-- Accent dot (gamification hint) -->
  <circle cx="82" cy="38" r="5" fill="#FBBF24" opacity="0.9"/>
  <circle cx="82" cy="38" r="2" fill="white"/>
</svg>
